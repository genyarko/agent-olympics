services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-boardroom}:${POSTGRES_PASSWORD:-boardroom_password}@postgres:5432/${POSTGRES_DB:-boardroom}
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boardroom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boardroom_password}
      POSTGRES_DB: ${POSTGRES_DB:-boardroom}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  caddy_data:
  caddy_config:
  pgdata:
